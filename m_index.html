<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة خاصة لصديقي 😂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); /* ألوان أزرق فاتح مناسبة للأصدقاء */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            direction: rtl;
        }

        /* تنسيق الصفحة الأولى (صفحة البداية) */
        #welcome-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: linear-gradient(135deg, #c2e9fb 0%, #a1c4fd 100%);
            transition: opacity 0.5s ease-out, visibility 0.5s;
            text-align: center;
        }

        .welcome-text {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: bold;
            padding: 0 20px;
        }

        .next-button {
            background-color: #3498db; /* لون أزرق جذاب للزر */
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
            transition: all 0.3s ease;
        }

        .next-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        /* تنسيق صفحة المزحة (مخفية في البداية) */
        #prank-screen {
            display: none; /* مخفية */
            opacity: 0;
            transition: opacity 0.8s ease-in;
            text-align: center;
            z-index: 5;
        }

        .prank-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            margin: 0 auto;
        }

        .prank-message {
            color: #e74c3c; /* لون أحمر مضحك للمفاجأة */
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
        }

        .emoji {
            font-size: 3rem;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <p class="welcome-text">أحب أن أقول لك بمناسبة العيد...</p>
        <button class="next-button" onclick="showPrank()">التالي</button>
    </div>

    <div id="prank-screen">
        <div class="prank-card">
            <p class="prank-message">سويلي موطة 😂🍦</p>
            <span class="emoji">❄️😎</span>
        </div>
    </div>

    <script>
        function showPrank() {
            // إخفاء صفحة الترحيب
            const welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';

            // إظهار المزحة بعد وقت قصير
            setTimeout(() => {
                const prankScreen = document.getElementById('prank-screen');
                prankScreen.style.display = 'block';
                
                // تفعيل تأثير الظهور المتدرج
                setTimeout(() => {
                    prankScreen.style.opacity = '1';
                }, 50);

            }, 500); // وقت انتظار أقصر لتأثير أسرع
        }
    </script>
</body>
</html>
