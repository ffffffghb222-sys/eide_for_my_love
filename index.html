<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لـ لاري ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* استخدمت خط القاهرة إذا توفر، أو خطوط النظام */
            overflow: hidden;
            direction: rtl;
        }

        /* تنسيق الصفحة الأولى (صفحة الزر) */
        #welcome-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: linear-gradient(135deg, #fecfef 0%, #ff9a9e 100%);
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .main-button {
            background-color: #d63384; /* لون زهري غامق جذاب */
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(214, 51, 132, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .main-button:hover {
            background-color: #c22073;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(214, 51, 132, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(214, 51, 132, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 30px rgba(214, 51, 132, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 20px rgba(214, 51, 132, 0.3); }
        }

        /* تنسيق صفحة المعايدة (مخفية في البداية) */
        #greeting-card {
            display: none; /* مخفية */
            opacity: 0;
            transition: opacity 1s ease-in;
            text-align: center;
            z-index: 5;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 90%; /* استجابة للشاشات الصغيرة */
            margin: 0 auto;
        }

        h1 { color: #d63384; margin-bottom: 20px; font-size: 2rem; }
        p { color: #555; line-height: 1.8; font-size: 1.25rem; }
        
        .heart-icon {
            color: #ff4d6d;
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* قلوب متساقطة في الخلفية */
        .hearts-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            display: none; /* تظهر مع البطاقة */
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <button class="main-button" onclick="showGreeting()">دوسي هنا يا حلوة (لاري❤️)</button>
    </div>

    <div class="hearts-bg" id="hearts-bg"></div>
    <div id="greeting-card">
        <div class="card">
            <span class="heart-icon">❤️</span>
            <h1>كل عام وأنتِ بخير يا لاري</h1>
            <p>إلى أغلى إنسانة في قلبي، عيدي لا يكتمل إلا بوجودكِ. أدامكِ الله لي في كل أعيادي، وحفظكِ لي يا كل دنيتي.</p>
            <p><strong>عيد فطر مبارك يا حبيبتي</strong></p>
        </div>
    </div>

    <script>
        // وظيفة لإظهار المعايدة وإخفاء الزر
        function showGreeting() {
            // إخفاء صفحة الترحيب
            const welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';

            // إظهار بطاقة المعايدة وخلفية القلوب بعد قليل
            setTimeout(() => {
                const greetingCard = document.getElementById('greeting-card');
                const heartsBg = document.getElementById('hearts-bg');
                
                greetingCard.style.display = 'block';
                heartsBg.style.display = 'block';
                
                // إضافة القلوب المتساقطة ديناميكياً
                createHearts();

                // تفعيل تأثير الظهور المتدرج
                setTimeout(() => {
                    greetingCard.style.opacity = '1';
                }, 50);

            }, 800); // الانتظار حتى ينتهي تأثير اختفاء الزر
        }

        // وظيفة لإنشاء عناصر القلوب المتساقطة
        function createHearts() {
            const container = document.getElementById('hearts-bg');
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'absolute';
                heart.style.color = `rgba(255, ${Math.random()*100+100}, ${Math.random()*100+100}, ${Math.random()*0.5+0.3})`;
                heart.style.fontSize = `${Math.random() * 20 + 10}px`;
                heart.style.left = `${Math.random() * 100}%`;
                heart.style.top = `-${Math.random() * 20}%`;
                heart.style.animation = `fall ${Math.random() * 3 + 2}s linear infinite`;
                heart.style.animationDelay = `${Math.random() * 2}s`;
                container.appendChild(heart);
            }
        }

        // تعريف حركة السقوط في CSS dynamic
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fall {
                to {
                    transform: translateY(110vh) rotate(${Math.random()*360}deg);
                }
            }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
